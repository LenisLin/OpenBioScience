name: Build Installers

permissions:
  contents: read
  actions: read

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build. Leave empty to use the current ref.'
        required: false
        default: ''
        type: string
      skip_code_quality:
        description: 'Skip code quality checks.'
        required: false
        default: true
        type: boolean

env:
  BUN_INSTALL_REGISTRY: 'https://registry.npmjs.org/'

jobs:
  build-installers:
    name: Build Desktop Installers
    uses: ./.github/workflows/_build-reusable.yml
    with:
      ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || '' }}
      skip_code_quality: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_code_quality }}
      append_commit_hash: true
      upload_installers_only: true
      matrix: >-
        {"include":[
          {"platform":"macos-arm64","os":"macos-14","command":"node scripts/build-with-builder.js arm64 --mac --arm64","artifact-name":"OpenScience-macos-arm64","arch":"arm64"},
          {"platform":"macos-x64","os":"macos-14","command":"node scripts/build-with-builder.js x64 --mac --x64","artifact-name":"OpenScience-macos-x64","arch":"x64"},
          {"platform":"windows-x64","os":"windows-2022","command":"node scripts/build-with-builder.js x64 --win --x64","artifact-name":"OpenScience-windows-x64","arch":"x64"},
          {"platform":"linux-x64","os":"ubuntu-latest","command":"node scripts/build-with-builder.js x64 --linux --x64","artifact-name":"OpenScience-linux-x64","arch":"x64"},
          {"platform":"linux-arm64","os":"ubuntu-24.04-arm","command":"node scripts/build-with-builder.js arm64 --linux --arm64","artifact-name":"OpenScience-linux-arm64","arch":"arm64"}
        ]}
    secrets: inherit
