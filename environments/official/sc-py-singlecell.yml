name: sc-py-singlecell
channels:
  - conda-forge
  - bioconda
dependencies:
  # Python base for AnnData/Scanpy object IO, QC, preprocessing, and
  # neighborhood graph construction. R-side object handoff lives in
  # sc-r-singlecell. Figure production lives in sc-r-plot.
  - python=3.11.*
  - pip
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - anndata
  - mudata
  - muon
  - scanpy
  - h5py
  - zarr
  - pytables
  - umap-learn
  - leidenalg
  - python-igraph
  - pynndescent
  - matplotlib-base
  - requests
  - beautifulsoup4
  - lxml
  - pyyaml
  - biopython
  - mygene
  - celltypist
  - scrublet
  - gseapy
  - harmonypy
  - bbknn
  - scanorama
  - typer
  - pydantic
  - snakemake-minimal
  - pip:
      # Provider and CCI packages with faster PyPI availability than conda.
      - decoupler
      - GEOparse
      - pysradb
      - cellphonedb
      - liana
