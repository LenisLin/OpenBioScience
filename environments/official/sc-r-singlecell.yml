name: sc-r-singlecell
channels:
  - conda-forge
  - bioconda
dependencies:
  # R base for Seurat/SingleCellExperiment object workflows, QC,
  # preprocessing, annotation, and R/Python handoff through zellkonverter.
  # This base tracks the conda v5 Seurat + SeuratObject pair.
  - r-base=4.5.*
  - r-seurat=5.*
  - r-seuratobject=5.*
  - r-sctransform
  - r-future
  - r-future.apply
  - r-data.table
  - r-dplyr
  - r-tidyr
  - r-tibble
  - r-readr
  - r-stringr
  - r-yaml
  - r-jsonlite
  - r-optparse
  - jq
  - r-ggplot2
  - r-patchwork
  - r-cowplot
  - r-pheatmap
  - bioconductor-complexheatmap
  - bioconductor-singlecellexperiment
  - bioconductor-summarizedexperiment
  - bioconductor-scater
  - bioconductor-scran
  - bioconductor-scuttle
  - bioconductor-dropletutils
  - bioconductor-zellkonverter
  - bioconductor-singler
  - bioconductor-celldex
  - bioconductor-deseq2
  - bioconductor-edger
  - bioconductor-limma
  - bioconductor-mast
  - bioconductor-muscat
  - bioconductor-clusterprofiler
  - bioconductor-enrichplot
  - bioconductor-fgsea
  - bioconductor-gsva
  - bioconductor-aucell
  - bioconductor-ucell
  - bioconductor-glmgampoi
  - bioconductor-biomart
  - bioconductor-annotationhub
  - bioconductor-go.db
  - bioconductor-org.hs.eg.db
  - bioconductor-org.mm.eg.db
  - r-msigdbr
