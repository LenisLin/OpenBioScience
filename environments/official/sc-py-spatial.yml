name: sc-py-spatial
channels:
  - conda-forge
dependencies:
  # CPU baseline for 10x Visium and Squidpy-registry workflows. Keep model-
  # based deconvolution and image representation learning in separate profiles.
  - python=3.12.*
  - pip

  # Matrix, statistics, and reproducible graph analysis
  - numpy>=1.26,<3
  - pandas>=2.1,<3
  - scipy>=1.11,<2
  - statsmodels>=0.14,<1
  - scikit-learn>=1.4,<2
  - anndata>=0.10,<1
  - scanpy>=1.10,<2
  - h5py>=3.10,<4
  - zarr>=2.18,<4
  - pyarrow>=15,<23
  - umap-learn>=0.5,<1
  - leidenalg>=0.10,<1
  - python-igraph>=0.11,<1
  - pynndescent>=0.5,<1

  # Spatial object IO, neighborhood statistics, and Moran's I
  - squidpy>=1.6,<2
  - spatialdata>=0.3,<1
  - spatialdata-io>=0.2,<1

  # Tissue-image and publication artifact support
  - pillow>=10,<13
  - imageio>=2.34,<3
  - tifffile>=2024.2
  - scikit-image>=0.22,<1
  - matplotlib-base>=3.8,<4
  - seaborn>=0.13,<1
