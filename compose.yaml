services:
  openbioscience:
    build:
      context: .
      dockerfile: Dockerfile
    image: openbioscience-webui:local
    command: ['bun', 'scripts/webui.ts', '--no-build', '--no-open', '--remote', '--port', '25808']
    ports:
      - '25808:25808'
    volumes:
      - openbioscience-data:/data
      - openbioscience-environments:/opt/openbioscience/env:ro
    environment:
      DEEPORGANISER_ALLOW_REMOTE: 'true'
      DEEPORGANISER_DATA_DIR: /data
      DEEPORGANISER_LOG_DIR: /data/logs
      DEEPORGANISER_NO_BUILD: '1'
      DEEPORGANISER_OPEN_BROWSER: '0'
      DEEPORGANISER_STATIC_DIR: /app/out/renderer
      OPENBIOSCIENCE_ENV_ROOT: /opt/openbioscience/env
    restart: unless-stopped

  environment-bootstrap:
    image: openbioscience-webui:local
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ['bootstrap']
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    command: ['bun', 'scripts/bootstrap-official-environment.ts']
    volumes:
      - openbioscience-environments:/opt/openbioscience/env
    environment:
      OPENBIOSCIENCE_ENV_ROOT: /opt/openbioscience/env
      OPENBIOSCIENCE_ENV_REPOSITORY: ${OPENBIOSCIENCE_ENV_REPOSITORY:-}
      OPENBIOSCIENCE_ENV_REVISION: ${OPENBIOSCIENCE_ENV_REVISION:-}
      OPENBIOSCIENCE_ENVIRONMENT: ${OPENBIOSCIENCE_ENVIRONMENT:-sc-py-singlecell}
      HF_TOKEN: ${HF_TOKEN:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      ALL_PROXY: ${ALL_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      all_proxy: ${all_proxy:-}
      no_proxy: ${no_proxy:-}
    restart: 'no'

volumes:
  openbioscience-data:
  openbioscience-environments:
