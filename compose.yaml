services:
  openbioscience:
    build:
      context: .
      dockerfile: Dockerfile
    image: openbioscience-webui:local
    command: ['bun', 'scripts/webui.ts', '--no-build', '--no-open', '--remote', '--port', '25808']
    ports:
      - '25808:25808'
    volumes:
      - openbioscience-data:/data
      - ${OPENBIOSCIENCE_ENV_ROOT:?Set OPENBIOSCIENCE_ENV_ROOT to the server OpenBioScience environment root.}:/opt/openbioscience/env:ro
      - ${OPENBIOSCIENCE_HOST_NODE_PREFIX:-/home/lenislin/.nvm/versions/node/v22.18.0}:/opt/openbioscience/host-node:ro
      - ${OPENBIOSCIENCE_CODEX_HOME:-/home/lenislin/.codex}:/root/.codex
      - ${OPENBIOSCIENCE_CLAUDE_HOME:-/home/lenislin/.claude}:/root/.claude
      - ${OPENBIOSCIENCE_SERVER_WORKSPACE_ROOT:-.}:/workspace/openbioscience
    environment:
      DEEPORGANISER_ALLOW_REMOTE: 'true'
      DEEPORGANISER_DATA_DIR: /data
      DEEPORGANISER_LOG_DIR: /data/logs
      DEEPORGANISER_NO_BUILD: '1'
      DEEPORGANISER_OPEN_BROWSER: '0'
      DEEPORGANISER_STATIC_DIR: /app/out/renderer
      FONTCONFIG_FILE: /etc/fonts/fonts.conf
      FONTCONFIG_PATH: /etc/fonts
      OPENBIOSCIENCE_ENV_ROOT: /opt/openbioscience/env
      OPENBIOSCIENCE_BIO_RESOURCE_ROOT: /app/resources/bio
      OPENBIOSCIENCE_GENE_SET_ROOT: /app/resources/bio/gene_sets
      OPENBIOSCIENCE_MARKER_ROOT: /app/resources/bio/markers
      OPENBIOSCIENCE_MSIGDB_ROOT: /app/resources/bio/gene_sets/msigdb
      OPENBIOSCIENCE_SKILL_ROOTS: /app/resources/skills
      OPENBIOSCIENCE_WORKSPACE_ROOT: /workspace/openbioscience
      OPENSCIENCE_BIO_TOOLS_ENABLED: 'true'
      OPENSCIENCE_BIO_TOOLS_PYTHON: /opt/openbioscience/env/environments/official/sc-py-singlecell/bin/python
      PYTHONDONTWRITEBYTECODE: '1'
      PATH: /opt/openbioscience/host-node/bin:/opt/openbioscience/env/environments/official/sc-py-singlecell/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    restart: unless-stopped

  environment-bootstrap:
    image: openbioscience-webui:local
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ['bootstrap']
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    command: ['bun', 'scripts/bootstrap-official-environment.ts']
    volumes:
      - ${OPENBIOSCIENCE_ENV_ROOT:?Set OPENBIOSCIENCE_ENV_ROOT to the server OpenBioScience environment root.}:/opt/openbioscience/env
    environment:
      OPENBIOSCIENCE_ENV_ROOT: /opt/openbioscience/env
      OPENBIOSCIENCE_BIO_RESOURCE_ROOT: /app/resources/bio
      OPENBIOSCIENCE_GENE_SET_ROOT: /app/resources/bio/gene_sets
      OPENBIOSCIENCE_MARKER_ROOT: /app/resources/bio/markers
      OPENBIOSCIENCE_MSIGDB_ROOT: /app/resources/bio/gene_sets/msigdb
      OPENBIOSCIENCE_ENV_REPOSITORY: ${OPENBIOSCIENCE_ENV_REPOSITORY:-}
      OPENBIOSCIENCE_ENV_REVISION: ${OPENBIOSCIENCE_ENV_REVISION:-}
      OPENBIOSCIENCE_ENVIRONMENT: ${OPENBIOSCIENCE_ENVIRONMENT:-sc-py-singlecell}
      HF_TOKEN: ${HF_TOKEN:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      ALL_PROXY: ${ALL_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      all_proxy: ${all_proxy:-}
      no_proxy: ${no_proxy:-}
    restart: 'no'

volumes:
  openbioscience-data:
